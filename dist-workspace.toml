[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.3"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Build each package with `-p <pkg>` instead of `--workspace`. Required here:
# the workspace mixes pyo3 `auto-initialize` (binary, links libpython) with
# `extension-module` (ntoseye-py wheel, no libpython). A --workspace build
# unifies those features and the binary fails to link (undefined PyExc_* etc).
precise-builds = true
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "~/.local/bin/"
# Whether to install an updater program
install-updater = false
# The binary defaults to in-REPL Python scripting (python-embed, like distro
# gdb/lldb), so it links libpython: the build needs the python dev lib (apt dep
# below) and the released binary needs a libpython3 at runtime (near-universal on
# Linux; abi3 -> any Python 3.x).
[dist.dependencies.apt]
python3-dev = '*'
